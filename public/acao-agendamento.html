<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111111">
    <meta name="description" content="Confirme, cancele ou reagende seu horario no Studio Mazoni Barber.">
    <title>Horario | Studio Mazoni Barber</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg?v=4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold: #d7b46a;
            --gold-light: #e8cc8c;
            --bg: #111111;
            --surface: #1a1a1a;
            --surface2: #242424;
            --border: #2e2e2e;
            --text: #f0ece4;
            --text-muted: #8a8278;
            --danger: #e05555;
            --success: #4caf81;
            --radius: 12px;
            --radius-sm: 8px;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 48px;
        }

        /* Brand */
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            margin-bottom: 32px;
            align-self: flex-start;
        }
        .brand-mark {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gold);
            color: #111;
            font-weight: 700;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .brand-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.2;
        }
        .brand-sub {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.2;
        }

        /* Card */
        .card {
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header do card */
        .card-header { display: flex; flex-direction: column; gap: 4px; }
        .kicker {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--gold);
        }
        .card-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
        }
        .card-message {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* Resumo do agendamento */
        .summary {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .summary-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .summary-icon {
            font-size: 15px;
            width: 20px;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .summary-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--text-muted);
            line-height: 1.2;
        }
        .summary-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.4;
        }
        .summary-detail {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            text-transform: capitalize;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-muted);
        }
        .status-badge.confirmado { color: var(--success); border-color: #4caf8140; }
        .status-badge.agendado   { color: var(--gold);    border-color: #d7b46a40; }
        .status-badge.cancelado  { color: var(--danger);  border-color: #e0555540; }

        /* Formulario de cancelamento */
        .cancel-form { display: flex; flex-direction: column; gap: 8px; }
        .form-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
        }
        textarea, input[type="date"] {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            padding: 10px 12px;
            resize: vertical;
            transition: border-color .15s;
            -webkit-appearance: none;
        }
        textarea:focus, input[type="date"]:focus {
            outline: none;
            border-color: var(--gold);
        }
        textarea::placeholder { color: var(--text-muted); }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.7) sepia(1) hue-rotate(5deg) saturate(2);
            cursor: pointer;
        }

        /* Calendário de reagendamento */
        .reschedule-section { display: flex; flex-direction: column; gap: 16px; }
        .date-row { display: flex; flex-direction: column; gap: 8px; }
        .slots-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
        }
        .slots-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .slot-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 4px;
            cursor: pointer;
            transition: all .15s;
            text-align: center;
        }
        .slot-btn:hover {
            border-color: var(--gold);
            background: #d7b46a15;
            color: var(--gold-light);
        }
        .slot-btn.selected {
            background: var(--gold);
            border-color: var(--gold);
            color: #111;
        }
        .slots-empty {
            font-size: 13px;
            color: var(--text-muted);
            padding: 12px 0;
        }
        .slots-loading {
            font-size: 13px;
            color: var(--text-muted);
            padding: 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin .6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Botoes */
        .buttons { display: flex; flex-direction: column; gap: 10px; }
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all .15s;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: var(--gold);
            color: #111;
        }
        .btn-primary:hover { background: var(--gold-light); }
        .btn-primary:disabled {
            opacity: .5;
            cursor: not-allowed;
        }
        .btn-primary.danger {
            background: var(--danger);
            color: #fff;
        }
        .btn-primary.danger:hover { background: #e87070; }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }
        .btn-secondary:hover { border-color: #444; color: var(--text); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 14px;
            font-weight: 500;
            padding: 12px 20px;
            border-radius: 100px;
            box-shadow: 0 8px 32px #0009;
            transition: transform .25s ease;
            white-space: nowrap;
            max-width: calc(100vw - 32px);
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 100;
        }
        .toast.visible { transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: #e0555560; color: var(--danger); }

        /* Estado de sucesso */
        .success-icon {
            font-size: 48px;
            text-align: center;
        }

        [hidden] { display: none !important; }
    </style>
</head>
<body>
    <main class="page">
        <a class="brand" href="/" aria-label="Studio Mazoni Barber">
            <div class="brand-mark">M</div>
            <div>
                <div class="brand-name">Studio Mazoni Barber</div>
                <div class="brand-sub">Agenda online</div>
            </div>
        </a>

        <div class="card">
            <div class="card-header">
                <span id="actionKicker" class="kicker">Carregando</span>
                <h1 id="actionTitle" class="card-title">Conferindo seu horario</h1>
                <p id="actionMessage" class="card-message">Estamos validando o link seguro enviado pelo WhatsApp.</p>
            </div>

            <div id="successIcon" class="success-icon" hidden></div>

            <div id="appointmentSummary" class="summary" hidden></div>

            <!-- Formulario de cancelamento -->
            <div id="cancelForm" class="cancel-form" hidden>
                <label class="form-label" for="cancelReason">Motivo (opcional)</label>
                <textarea id="cancelReason" rows="3" maxlength="300"
                    placeholder="Ex: surgiu um compromisso inesperado"></textarea>
            </div>

            <!-- Formulario de reagendamento -->
            <div id="rescheduleSection" class="reschedule-section" hidden>
                <div class="date-row">
                    <label class="form-label" for="rescheduleDate">Escolha uma data</label>
                    <input id="rescheduleDate" type="date">
                </div>
                <div>
                    <p class="slots-title" id="slotsTitle">Horarios disponíveis</p>
                    <div id="slotsLoading" class="slots-loading" hidden>
                        <div class="spinner"></div>
                        Buscando horarios...
                    </div>
                    <div id="slotsGrid" class="slots-grid"></div>
                    <p id="slotsEmpty" class="slots-empty" hidden>Nenhum horario disponivel nessa data.</p>
                </div>
            </div>

            <div class="buttons">
                <button id="primaryAction" class="btn btn-primary" type="button" hidden>Confirmar</button>
                <a class="btn btn-secondary" href="/">Voltar ao site</a>
            </div>
        </div>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/acao-agendamento.js?v=2"></script>
</body>
</html>
